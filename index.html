<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tokyo Shadowing Master</title>
<style>
  :root{
    --bg1:#0d1016;
    --bg2:#171c25;
    --panel:rgba(255,255,255,.04);
    --line:#394150;
    --text:#eef2f7;
    --muted:#b8c0cc;
    --jp:#ff5a5a;
    --kana:#ffb347;
    --romaji:#ffe066;
    --zh:#7CFC8A;
    --accent:#78a6ff;
    --active-bg:rgba(120,166,255,0.18);
    --active-border:#78a6ff;
    --narrator:#d7c4ff;
    --staff:#8fd3ff;
    --guest:#ffb3d1;
    --card:#1a1f29;
    --mode-bg:#fff4cc;
    --mode-text:#8B4513;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    color:var(--text);
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:24px 16px 80px;
  }
  h1{margin:0 0 8px;font-size:28px}
  .sub{color:var(--muted);line-height:1.7;margin-bottom:16px}
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.18);
  }
  .mode-switch{
    position:relative;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0;
    margin-bottom:6px;
    background:linear-gradient(180deg,#fffdf2,#fff3c9);
    border:1px solid #dcc57a;
    border-radius:18px;
    padding:6px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.45),
      0 8px 18px rgba(0,0,0,.12);
    overflow:hidden;
  }
  .mode-slider{
    position:absolute;
    top:6px;
    left:6px;
    width:calc(50% - 6px);
    height:calc(100% - 12px);
    border-radius:14px;
    background:linear-gradient(180deg,#f7ebbe,#f1df9b);
    border:1px solid #e2cf8c;
    box-shadow:
      0 8px 20px rgba(139,69,19,.18),
      inset 0 1px 0 rgba(255,255,255,.6),
      0 0 0 1px rgba(255,255,255,.3);
    transition:transform .38s cubic-bezier(.34,1.56,.64,1);
    z-index:0;
  }
  .mode-switch.restaurant .mode-slider{
    transform:translateX(100%);
  }
  .mode-btn{
    position:relative;
    z-index:1;
    border:none;
    border-radius:14px;
    padding:14px 18px;
    font-size:19px;
    cursor:pointer;
    min-width:180px;
    background:transparent !important;
    color:var(--mode-text) !important;
    font-weight:600;
    transition:color .25s ease, transform .18s ease, text-shadow .25s ease;
  }
  .mode-btn.active{
    background:transparent !important;
    color:#6b3410 !important;
    border:none;
    font-weight:700;
    text-shadow:0 1px 0 rgba(255,255,255,.35);
  }
  .mode-btn:hover{
    background:transparent !important;
    color:#6b3410 !important;
  }
  .mode-btn:active{
    transform:scale(1.03);
  }
  .controls{
    display:grid;
    grid-template-columns: repeat(6, minmax(0,1fr));
    gap:10px;
  }
  button:not(.mode-btn){
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:19px;
    cursor:pointer;
    background:#2a3342;
    color:#fff;
  }
  button.primary{background:var(--accent); color:#08111f; font-weight:700;}
  button.warn{background:#6a2e2e}
  button:disabled{opacity:.5; cursor:not-allowed}
  label{
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:17px;
    color:var(--muted);
  }
  input[type="range"], select{width:100%}
  select{
    background:#161b24;
    color:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
  }
  .status{font-size:21px; line-height:1.8}
  .status b{color:#fff}
  .dialogue{display:flex; flex-direction:column; gap:12px}
  .line{
    padding:14px;
    border-radius:16px;
    background:var(--card);
    border:1px solid var(--line);
    transition:.18s ease;
  }
  .line.current{
    background:var(--active-bg) !important;
    border:1px solid var(--active-border);
    box-shadow:0 0 0 1px rgba(120,166,255,.15) inset;
  }
  .role{
    display:inline-block;
    font-size:12px;
    padding:4px 8px;
    border-radius:999px;
    margin-bottom:10px;
    color:#111;
    font-weight:700;
  }
  .role.narrator{background:var(--narrator);}
  .role.staff{background:var(--staff);}
  .role.guest{background:var(--guest);}
  .jp{color:var(--jp); font-size:29px; font-weight:700; line-height:1.55;}
  .kana{color:var(--kana); margin-top:8px; line-height:1.6;}
  .romaji{color:var(--romaji); margin-top:5px; line-height:1.6;}
  .zh{color:var(--zh); margin-top:8px; font-size:21px; line-height:1.6;}
  .note{color:var(--muted); line-height:1.7; font-size:14px;}
  .mini{font-size:17px; color:var(--muted);}
  .hidden{display:none !important}
  .unlock-tip{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:rgba(255,244,204,.96);
    color:#6b3410;
    border:1px solid #e2cf8c;
    border-radius:999px;
    padding:10px 16px;
    font-size:16px;
    font-weight:700;
    box-shadow:0 8px 20px rgba(0,0,0,.18);
    z-index:9999;
    transition:opacity .25s ease, transform .25s ease;
  }
  .unlock-tip.hide{
    opacity:0;
    transform:translateX(-50%) translateY(8px);
    pointer-events:none;
  }
  @media (max-width: 980px){
    .controls{grid-template-columns: repeat(2, minmax(0,1fr));}
    .mode-switch{
      grid-template-columns:1fr;
      gap:6px;
      padding:6px;
    }
    .mode-slider{
      display:none;
    }
    .mode-btn{
      min-width:unset;
      width:100%;
      background:rgba(255,248,222,.55) !important;
      border:1px solid #e2cf8c;
    }
    .mode-btn.active{
      background:linear-gradient(180deg,#fffdf2,#fff3c9) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎧 Tokyo Shadowing Master｜一日遊＋餐廳對話整合版</h1>
  <div class="sub">
    模式切換：東京一日遊旁白版 / 和牛餐廳客人 vs 店員版。<br>
    播放到哪一句，就哪一句淡藍色高亮。日文、平假名、羅馬拼音、中文同步顯示。
  </div>

  <div class="panel">
    <div class="mode-switch trip" id="modeSwitch">
      <div class="mode-slider"></div>
      <button class="mode-btn active" id="modeTrip">🗼 一日遊導覽模式</button>
      <button class="mode-btn" id="modeRestaurant">🍽️ 餐廳對話模式</button>
    </div>
    <div class="note" id="modeDesc">
      目前模式：一日遊導覽模式。以「旁白感」方式帶你走完整天動線。
    </div>
  </div>

  <div class="panel">
    <div class="controls">
      <button class="primary" id="btnPlayAll">▶ 全部播放</button>
      <button id="btnPlayOne">⏯ 播放目前句</button>
      <button id="btnPrev">⏮ 上一句</button>
      <button id="btnNext">⏭ 下一句</button>
      <button id="btnPause">⏸ 暫停語音</button>
      <button class="warn" id="btnStop">⏹ 停止</button>

      <label>
        語速
        <input id="rate" type="range" min="0.75" max="1.15" step="0.05" value="0.8">
        <span class="mini" id="rateLabel">0.80x</span>
      </label>

      <label>
        每句停頓（毫秒）
        <select id="gap">
          <option value="600">600</option>
          <option value="800">800</option>
          <option value="1000" selected>1000</option>
          <option value="1200">1200</option>
          <option value="1500">1500</option>
        </select>
      </label>

      <label>
        每句重播次數
        <select id="repeat">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
        </select>
      </label>

      <label id="roleFilterWrap" class="hidden">
        角色過濾
        <select id="filterRole">
          <option value="all" selected>全部</option>
          <option value="guest">只聽客人</option>
          <option value="staff">只聽店員</option>
        </select>
      </label>

      <label class="hidden" id="tripHintWrap">
        導覽提示
        <div class="note">建議第1輪只聽旁白，第2輪跟讀，第3輪不看中文直接說。</div>
      </label>

      <label class="hidden" id="restHintWrap">
        對話提示
        <div class="note">可切「只聽客人」練點餐，也可切「只聽店員」練聽力。</div>
      </label>
    </div>
  </div>

  <div class="panel">
    <div class="status" id="status">
      <b>狀態：</b>待機中<br>
      <b>目前句：</b>1 / 1
    </div>
  </div>

  <div class="panel">
    <div class="dialogue" id="dialogue"></div>
  </div>
</div>

<div class="unlock-tip" id="unlockTip">👆 首次點頁面任一處，即自動解鎖語音</div>

<script>
const tripData = [
  {role:"narrator", jp:"今日は東京で一日観光します。", kana:"きょう は とうきょう で いちにち かんこう します。", romaji:"kyou wa toukyou de ichinichi kankou shimasu.", zh:"今天在東京進行一日觀光。"},
  {role:"narrator", jp:"まず、浅草へ行って、浅草寺を見に行きます。", kana:"まず、あさくさ へ いって、せんそうじ を みに いきます。", romaji:"mazu, asakusa e itte, sensouji o mi ni ikimasu.", zh:"首先前往淺草，去看淺草寺。"},
  {role:"narrator", jp:"雷門や仲見世通りはとても有名です。", kana:"かみなりもん や なかみせどおり は とても ゆうめい です。", romaji:"kaminari-mon ya nakamise-doori wa totemo yuumei desu.", zh:"雷門和仲見世商店街都非常有名。"},
  {role:"narrator", jp:"次に、上野公園へ行って、少し散歩します。", kana:"つぎ に、うえのこうえん へ いって、すこし さんぽ します。", romaji:"tsugi ni, ueno kouen e itte, sukoshi sanpo shimasu.", zh:"接著前往上野公園，稍微散步一下。"},
  {role:"narrator", jp:"そのあと、秋葉原へ行って、昼ごはんを食べます。", kana:"そのあと、あきはばら へ いって、ひるごはん を たべます。", romaji:"sono ato, akihabara e itte, hirugohan o tabemasu.", zh:"之後去秋葉原吃午餐。"},
  {role:"narrator", jp:"午後は銀座で買い物とカフェを楽しみます。", kana:"ごご は ぎんざ で かいもの と かふぇ を たのしみます。", romaji:"gogo wa ginza de kaimono to kafe o tanoshimimasu.", zh:"下午在銀座逛街和享受咖啡時光。"},
  {role:"narrator", jp:"夕方は東京タワーへ行って、きれいな景色を見ます。", kana:"ゆうがた は とうきょうタワー へ いって、きれいな けしき を みます。", romaji:"yuugata wa toukyou tawaa e itte, kirei na keshiki o mimasu.", zh:"傍晚前往東京塔，看美麗的景色。"},
  {role:"narrator", jp:"夜は銀座で和牛を食べて、日本酒も飲みます。", kana:"よる は ぎんざ で わぎゅう を たべて、にほんしゅ も のみます。", romaji:"yoru wa ginza de wagyuu o tabete, nihonshu mo nomimasu.", zh:"晚上在銀座吃和牛，也喝清酒。"},
  {role:"narrator", jp:"とても楽しい東京の一日です。", kana:"とても たのしい とうきょう の いちにち です。", romaji:"totemo tanoshii toukyou no ichinichi desu.", zh:"這是非常愉快的東京一日。"}
];

const restaurantData = [
  {role:"guest", jp:"すみません、二人です。", kana:"すみません、ふたり です。", romaji:"sumimasen, futari desu.", zh:"不好意思，我們兩位。"},
  {role:"staff", jp:"いらっしゃいませ。ご予約はありますか。", kana:"いらっしゃいませ。ごよやく は ありますか。", romaji:"irasshaimase. goyoyaku wa arimasu ka.", zh:"歡迎光臨。請問有預約嗎？"},
  {role:"guest", jp:"はい、予約しています。リーです。", kana:"はい、よやく して います。りー です。", romaji:"hai, yoyaku shite imasu. rii desu.", zh:"有，我們有預約。我姓 Lee。"},
  {role:"staff", jp:"ありがとうございます。こちらへどうぞ。", kana:"ありがとうございます。こちら へ どうぞ。", romaji:"arigatou gozaimasu. kochira e douzo.", zh:"謝謝。請這邊走。"},
  {role:"guest", jp:"メニューをお願いします。", kana:"めにゅー を おねがいします。", romaji:"menyuu o onegaishimasu.", zh:"請給我菜單。"},
  {role:"staff", jp:"本日のおすすめはA5和牛と純米吟醸です。", kana:"ほんじつ の おすすめ は えーご わぎゅう と じゅんまい ぎんじょう です。", romaji:"honjitsu no osusume wa ee-go wagyuu to junmai ginjou desu.", zh:"今天推薦的是 A5 和牛和純米吟釀。"},
  {role:"guest", jp:"では、和牛をお願いします。日本酒もください。", kana:"では、わぎゅう を おねがいします。にほんしゅ も ください。", romaji:"dewa, wagyuu o onegaishimasu. nihonshu mo kudasai.", zh:"那麼，請給我和牛。也請給我清酒。"},
  {role:"staff", jp:"かしこまりました。焼き加減はいかがなさいますか。", kana:"かしこまりました。やきかげん は いかが なさいますか。", romaji:"kashikomarimashita. yakikagen wa ikaga nasaimasu ka.", zh:"好的。請問熟度要怎麼樣呢？"},
  {role:"guest", jp:"おすすめでお願いします。", kana:"おすすめ で おねがいします。", romaji:"osusume de onegaishimasu.", zh:"照推薦的就可以。"},
  {role:"staff", jp:"承知しました。少々お待ちください。", kana:"しょうち しました。しょうしょう おまち ください。", romaji:"shouchi shimashita. shoushou omachi kudasai.", zh:"了解了。請稍候。"},
  {role:"guest", jp:"とても美味しいです。乾杯。", kana:"とても おいしい です。かんぱい。", romaji:"totemo oishii desu. kanpai.", zh:"非常好吃。乾杯。"},
  {role:"guest", jp:"お会計をお願いします。", kana:"おかいけい を おねがいします。", romaji:"okaikei o onegaishimasu.", zh:"請幫我結帳。"}
];

let mode = 'trip';
let currentIndex = 0;
let isPlayingAll = false;
let stopRequested = false;
let audioUnlocked = false;

const dialogueEl = document.getElementById('dialogue');
const statusEl = document.getElementById('status');
const modeDesc = document.getElementById('modeDesc');
const modeSwitch = document.getElementById('modeSwitch');
const modeTripBtn = document.getElementById('modeTrip');
const modeRestBtn = document.getElementById('modeRestaurant');
const filterRoleEl = document.getElementById('filterRole');
const roleFilterWrap = document.getElementById('roleFilterWrap');
const tripHintWrap = document.getElementById('tripHintWrap');
const restHintWrap = document.getElementById('restHintWrap');
const unlockTip = document.getElementById('unlockTip');

function roleLabel(role){
  if(role === 'staff') return '店員';
  if(role === 'guest') return '客人';
  return '旁白';
}
function currentSource(){
  if(mode === 'trip') return tripData;
  const selected = filterRoleEl.value;
  if(selected === 'all') return restaurantData;
  return restaurantData.filter(x => x.role === selected);
}
function refreshModeUI(){
  modeTripBtn.classList.toggle('active', mode === 'trip');
  modeRestBtn.classList.toggle('active', mode === 'restaurant');
  modeSwitch.classList.toggle('trip', mode === 'trip');
  modeSwitch.classList.toggle('restaurant', mode === 'restaurant');
  roleFilterWrap.classList.toggle('hidden', mode !== 'restaurant');
  tripHintWrap.classList.toggle('hidden', mode !== 'trip');
  restHintWrap.classList.toggle('hidden', mode !== 'restaurant');
  if(mode === 'trip'){
    modeDesc.textContent = '目前模式：一日遊導覽模式。以「旁白感」方式帶你走完整天動線。';
  }else{
    modeDesc.textContent = '目前模式：餐廳對話模式。可練客人點餐，也可練店員回應。';
  }
}
function buildUI(){
  const data = currentSource();
  if(currentIndex >= data.length) currentIndex = 0;
  dialogueEl.innerHTML = '';
  data.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'line' + (i === currentIndex ? ' current' : '');
    div.dataset.index = i;
    div.innerHTML = `
      <div class="role ${d.role}">${roleLabel(d.role)}</div>
      <div class="jp">${d.jp}</div>
      <div class="kana">平假名：${d.kana}</div>
      <div class="romaji">羅馬拼音：${d.romaji}</div>
      <div class="zh">中文：${d.zh}</div>
    `;
    div.addEventListener('click', () => {
      currentIndex = i;
      refreshHighlight();
      playCurrent();
    });
    dialogueEl.appendChild(div);
  });
  refreshHighlight();
}
function refreshStatus(msg){
  const data = currentSource();
  statusEl.innerHTML = `<b>狀態：</b>${msg}<br><b>目前句：</b>${data.length ? currentIndex + 1 : 0} / ${data.length}`;
}
function refreshHighlight(){
  [...document.querySelectorAll('.line')].forEach(el => el.classList.remove('current'));
  const cur = document.querySelector(`.line[data-index="${currentIndex}"]`);
  if(cur){
    cur.classList.add('current');
    cur.scrollIntoView({behavior:'smooth', block:'center'});
  }
  refreshStatus(isPlayingAll ? '連續播放中' : '待機中');
}
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function markUnlocked(){
  audioUnlocked = true;
  unlockTip.classList.add('hide');
}
function tryUnlockAudio(){
  if(audioUnlocked) return;
  try{
    const probe = new SpeechSynthesisUtterance(' ');
    probe.volume = 0;
    probe.rate = 1;
    probe.lang = 'ja-JP';
    probe.onend = () => markUnlocked();
    probe.onerror = () => markUnlocked();
    speechSynthesis.cancel();
    speechSynthesis.speak(probe);
    setTimeout(markUnlocked, 120);
  }catch(e){
    markUnlocked();
  }
}
function speak(text, rate){
  return new Promise(resolve => {
    if(!audioUnlocked){
      tryUnlockAudio();
      if(!audioUnlocked){
        refreshStatus('請先點頁面任一處啟用語音');
        resolve();
        return;
      }
    }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = rate;
    u.onend = () => resolve();
    u.onerror = () => resolve();
    speechSynthesis.speak(u);
  });
}
async function playCurrent(){
  const data = currentSource();
  if(!data.length) return;
  stopRequested = false;
  refreshHighlight();
  refreshStatus('播放目前句');
  const rate = parseFloat(document.getElementById('rate').value);
  const repeat = parseInt(document.getElementById('repeat').value, 10);
  const gap = parseInt(document.getElementById('gap').value, 10);
  for(let r=0; r<repeat; r++){
    if(stopRequested) break;
    await speak(data[currentIndex].jp, rate);
    if(r < repeat - 1) await sleep(gap);
  }
  if(!isPlayingAll && !stopRequested) refreshStatus('待機中');
}
async function playAll(){
  const data = currentSource();
  if(!data.length) return;
  isPlayingAll = true;
  stopRequested = false;
  const gap = parseInt(document.getElementById('gap').value, 10);
  for(let i = currentIndex; i < data.length; i++){
    if(stopRequested) break;
    currentIndex = i;
    refreshHighlight();
    await playCurrent();
    if(stopRequested) break;
    if(i < data.length - 1) await sleep(gap);
  }
  isPlayingAll = false;
  refreshStatus(stopRequested ? '已停止' : '播放完成');
}
function stopAll(){
  stopRequested = true;
  isPlayingAll = false;
  speechSynthesis.cancel();
  refreshStatus('已停止');
}

document.getElementById('btnPlayAll').addEventListener('click', playAll);
document.getElementById('btnPlayOne').addEventListener('click', playCurrent);
document.getElementById('btnPrev').addEventListener('click', () => {
  const data = currentSource();
  if(!data.length) return;
  currentIndex = Math.max(0, currentIndex - 1);
  refreshHighlight();
});
document.getElementById('btnNext').addEventListener('click', () => {
  const data = currentSource();
  if(!data.length) return;
  currentIndex = Math.min(data.length - 1, currentIndex + 1);
  refreshHighlight();
});
document.getElementById('btnPause').addEventListener('click', () => {
  if(speechSynthesis.speaking && !speechSynthesis.paused){
    speechSynthesis.pause();
    refreshStatus('已暫停');
  }else if(speechSynthesis.paused){
    speechSynthesis.resume();
    refreshStatus('繼續播放');
  }
});
document.getElementById('btnStop').addEventListener('click', stopAll);
document.getElementById('rate').addEventListener('input', e => {
  document.getElementById('rateLabel').textContent = Number(e.target.value).toFixed(2) + 'x';
});
modeTripBtn.addEventListener('click', () => {
  if(mode === 'trip') return;
  stopAll();
  mode = 'trip';
  currentIndex = 0;
  refreshModeUI();
  buildUI();
});
modeRestBtn.addEventListener('click', () => {
  if(mode === 'restaurant') return;
  stopAll();
  mode = 'restaurant';
  currentIndex = 0;
  refreshModeUI();
  buildUI();
});
filterRoleEl.addEventListener('change', () => {
  stopAll();
  currentIndex = 0;
  buildUI();
});

['pointerdown','touchstart','click','keydown'].forEach(evt => {
  window.addEventListener(evt, tryUnlockAudio, { passive:true, once:false });
});
document.addEventListener('visibilitychange', () => {
  if(!document.hidden && !audioUnlocked) tryUnlockAudio();
});

refreshModeUI();
buildUI();
</script>
</body>
</html>
